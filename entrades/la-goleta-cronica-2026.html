    goleta_anos80_p1:'Los años ochenta representaron una etapa de cambio profundo para <strong>Salou</strong> y la zona. La <strong>expansión turística</strong> generó una oferta de restauración diversa, a menudo orientada a formatos rápidos y a un público estacional. Era la era de las imitaciones, los turisteados quick-service y las propuestas sin criterio.',
    goleta_anos80_p2:'En este contexto, <strong>algunos establecimientos optaron por desarrollar proyectos con una vocación gastronómica más definida</strong>. La Goleta se inscribe dentro de esta generación de restaurantes que apostaron por una <strong>cocina de producto</strong> y por un <strong>servicio de sala estructurado</strong>.',
    goleta_anos80_p3:'Con el paso de los años, esta línea le ha permitido consolidarse como uno de los restaurantes con trayectoria continuada dentro del municipio. No fue la opción fácil. Pero fue la opción correcta.',
    goleta_cuina_label:'La propuesta',
    goleta_cuina_title:'Cocina mediterránea. Producto mandando.',
    goleta_cuina_p1:'La propuesta gastronómica del restaurante se ha articulado tradicionalmente alrededor de la <strong>cocina mediterránea</strong>. El <strong>peix y el marisco</strong> han ocupado un papel central en la carta, junto con elaboraciones que forman parte del repertorio culinario del litoral mediterráneo. Más allá de las tendencias que han ido apareciendo a lo largo de los años, el restaurante ha mantenido una <strong>línea culinaria relativament estable, basada en el producto y en una execución técnica reconocible</strong>.',
    goleta_cuina_p2:'No hay grandes alardes técnicos. No hay deconstrucciones innecesarias. No hay técnicas raras. Lo que hay es <strong>respeto absoluto por la materia prima</strong> y la capacidad de dejarla hablar. La gamba de Tarragona llega a la mesa como debe llegar: perfecta, cocinada con cuidado, sin subterfugios.',
    goleta_sala_label:'Un elemento histórico',
    goleta_sala_title:'La sala: servicio clásico sin modernismos',
    goleta_sala_p1:'Uno de los elementos que ha caracterizado históricamente a La Goleta es la <strong>atenció al servicio</strong>. El restaurante ha mantenido una concepción clásica de la sala, con un <strong>servicio estructurado y una relación directa con el cliente</strong>. Aquello que otros restaurantes buscan ahora —autenticidad, calor humano, ceremonial gastronómico— La Goleta nunca lo perdió.',
    goleta_sala_p2:'Actualmente, el proyecto está dirigido por <strong>Ignacio Ureña</strong>, vinculado durante años al restaurante como maître y sumiller, hecho que garantiza la <strong>continuidad de este modelo</strong>. Su presencia es la de un maestro de ceremonia: explica cada plato, contextualiza el vino, atiende cada detalle. Todo con una elegancia discreta. <strong>"Todo es evolución"</strong>, dice. Razón tiene.',
    goleta_visita_label:'9 de abril de 2026',
    goleta_visita_title:'La noche de los Gourmets',
    goleta_visita_p1:'La noche del 9 de abril llegamos <strong>treinta y seis comensales</strong> a la terrassa de La Goleta. Entre nosotros, una presencia singular: <strong>José Vilaseca Rius</strong>, cofundador de los <strong>Casacas Rojas de Barcelona</strong>, una institución gastronómica que a su manera —con sus locuras, sus anécdotas, su irreverencia— se ha convertido en referente del sector durante décadas.',
    goleta_visita_p2:'<strong>Vilaseca no solo comió con nosotros. Vilaseca nos enseñó, nos hizo reír y, al final, todos fuimos un poco Casaca Roja</strong>. Su presencia transformó la velada. Pasamos de ser comensales a ser aprendices de una lección de vida gastronómica.',
    goleta_visita_p3:'El espacio era conocido por la mayoría de nosotros. Cuarenta años. Las vistas sobre la playa, los detalles de madera, la iluminación cálida. <strong>Poco ha cambiado</strong>. Ni siquiera es un defecto. <strong>Es una afirmación</strong>. Elegancia, acogimiento, clasicismo —todo aquello que los restaurantes modernistas abandonan, La Goleta lo resolvió con sobriedad desde sus inicios.',
    goleta_anecdota_titulo:'🎯 La anécdota de Emilio Vicente que Ignacio nos contó',
    goleta_anecdota_texto:'Mientras Vilaseca hablaba, <strong>Ignacio Ureña recordó una historia real sobre Emilio Vicente, el fundador</strong>: durante años, Vicente nunca mostró la carta a los clientes. Simplemente vendía los platos, sin necesidad de que vieran escrito qué comían. Después de cuarenta años, los clientes finalmente comenzaron a ver las cartas. Es la anécdota perfecta que resume la filosofía del lugar: <strong>la confianza absoluta en quien cocina, no en la descripción impresa</strong>. Una lección de humildad gastronómica. Era Ignacio, desde su experiencia de años trabajando junto a Vicente, quien relataba esto con una sonrisa cómplice.',
    goleta_menu_label:'El recorrido de la noche',
    goleta_menu_title_h2:'La minuta: producto, ejecución, respeto',
    goleta_menu_intro:'Para esta segunda cita del recorrido 2026, el restaurante planteó un menú que se mantiene dentro de sus parámetros habituales: <strong>producto de proximidad y cocina mediterránea</strong>. La propuesta se articula en diversos bloques: <strong>entrants freds</strong> con base de producto marino, <strong>entrants calents</strong> centrados en elaboraciones clásicas, un apartado específico dedicado al rap con dos preparaciones diferentes, un postre de cierre de línea tradicional, y un acompañamiento de bodega con presencia de vinos del territorio.',
    goleta_menu_title:'Menú de la visita Gourmets · 9 abril 2026',

    goleta_analisis_label:'Análisis del menú',
    goleta_analisis_title:'Lectura del producto y su ejecución',
    goleta_analisis_p1:'La presencia de productos como la <strong>gamba de Tarragona</strong> y el uso de técnicas diversas sobre un mismo ingrediente permiten anticipar un menú orientado a la <strong>lectura del producto y de su ejecución</strong>. No es suficiente tener materia prima de calidad. Hay que saber qué hacer con ella.',
    goleta_analisis_p2:'El comentario más extendido entre los comensales fue directo: <strong>"Si esto es así y funciona, ¿por qué cambiarlo?"</strong> Cuarenta años de calidad alta, de cuidado máximo, de ejecución limpia. Este es el argumento que La Goleta defiende. Y es completamente sólido.',
    goleta_servicio_label:'La ejecución',
    goleta_servicio_title:'Servicio estructurado, sin innovaciones forzadas',
    goleta_servicio_p1:'<strong>Correcto, estructurado, sin modernismos</strong>. La mayoría de platos fueron servidos desde sus bandejas por parte de camareros con precisión, sin una sola mancha sobre la mesa. Cosa inusual en restaurantes ya modernizados que montan los platos en cocina y los sacan prestos. Aquí, el ceremonial tiene lugar en la sala, y eso hace diferencia.',
    goleta_servicio_p2:'<strong>Ignacio estaba presente en todo momento</strong>, explicando cada plato, sugiriendo cómo abordarlo, contextualizando. No es exceso. Es <strong>respeto</strong>. Porque el comensal merece saber qué come y por qué. Este es un servicio que otros han olvidado. La Goleta no.',
    goleta_vilaseca_titulo:'🎯 El grito de los Casacas Rojas',
    goleta_vilaseca_texto:'<strong>José Vilaseca entregó el diploma de la visita a Ignacio Ureña</strong>. Y entonces, de manera completamente improvisada, surgió de la sala un grito colectivo: <strong>"¡FESTIVAL!"</strong>. El grito de guerra de los Casacas Rojas. Vilaseca lo había mencionado durante su charla, y la sala entera, contagiada por su energía y su pasión, lo coreó. En ese momento, <strong>todos fuimos un poco Casaca Roja</strong>. Fue honesto, fue real, fue de esas cosas que no se olvidan. Treinta y seis personas gritando "¡Festival!" en una terrassa ante la Platja dels Capellans. Eso es gastronimía de verdad.',
    goleta_reflexion_label:'Conclusión',
    goleta_reflexion_title:'Cuarenta años de coherencia sin decepcionar',
    goleta_reflexion_p1:'<strong>La Goleta no nos sorprendió con alardes</strong>. Nos confortó con coherencia. Un <strong>menú construido sobre la verdad del producto</strong>. Una <strong>sala que respeta tanto al cliente como a la comida</strong>. Un <strong>equipo dirigido por Ignacio Ureña</strong> que entiende que la evolución no significa destruir lo que funciona, sino hacerlo más consciente, más elaborado, más honesto.',
    goleta_reflexion_p2:'<strong>Ignacio continúa la labor de Emilio Vicente, pero con su propia visión</strong>. La sala no ha cambiado radicalmente, pero funciona. El menú mantiene su estructura, pero respira. Cuarenta años de que esto sea así. Y sin intención de cambiar lo que funciona. En un contexto donde la tendencia es constantemente innovar, reinventarse y buscar notoriedad, esto es un lujo. Un lujo que la Costa Daurada merece tener en Salou, frente a la Platja dels Capellans, donde <strong>La Goleta permanece</strong>.',
    goleta_reflexion_p3:'Fue una noche que permitió observar con perspectiva el recorrido de un establecimiento que forma parte de la historia reciente de la restauración de la Costa Daurada, así como analizar su posicionamiento actual dentro del contexto gastronómico del territorio. Después de esta cena, las respuestas fueron claras.',
    goleta_reflexion_final:'40 años de La Goleta · 9 de abril de 2026 · Platja dels Capellans, Salou · "Si funciona, ¿por qué cambiarlo?"',

function setLang(lang) { currentLang = lang; localStorage.setItem('gdt-lang', lang); applyTranslations(lang); }
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[lang] && t[lang][key]) { el.textContent = t[lang][key]; }
  });
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
}
applyTranslations(currentLang);
</script>
