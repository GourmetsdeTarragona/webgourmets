<html lang="es" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Goleta · Crònica · Gourmets de Tarragona</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --navy:#1c2e3e; --navy-dark:#0e1e2c;
  --gold:#b8924a; --gold-light:#d4a96a;
  --cream:#f5f0e8; --cream2:#ede7da;
  --white:#fff; --muted:#6b6b6b; --border:#e8e2d8;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-ui:'Lato',system-ui,sans-serif;
  --shadow:0 4px 24px rgba(28,46,62,.10);
  --shadow2:0 12px 48px rgba(28,46,62,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-ui);color:var(--navy);background:var(--cream);line-height:1.6;overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;background:rgba(245,240,232,.97);backdrop-filter:blur(12px);box-shadow:0 1px 20px rgba(28,46,62,.10);}
.nav-inner{max-width:1140px;margin:0 auto;padding:0 40px;height:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo img{height:40px;width:auto;}
.nav-logo-name{font-family:var(--font-serif);font-size:1rem;font-weight:600;color:var(--navy);line-height:1.2;}
.nav-menu{display:flex;gap:28px;align-items:center;}
.nav-menu a{font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.nav-menu a:hover{color:var(--navy);}
.nav-right{display:flex;align-items:center;gap:12px;}
.lang-btn{background:none;border:none;cursor:pointer;font-family:var(--font-ui);font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);padding:4px 2px;transition:color .2s;}
.lang-btn.active{color:var(--navy);}
.lang-btn:hover{color:var(--navy);}
.lang-sep{color:var(--border);font-size:.8rem;}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--navy);transition:.3s;}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:var(--cream);z-index:199;padding:16px 0 24px;box-shadow:0 8px 24px rgba(28,46,62,.12);}
.mobile-menu.open{display:block;}
.mobile-item a{display:block;padding:11px 40px;font-family:var(--font-ui);font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.mobile-item a:hover{color:var(--navy);}
.mobile-lang{display:flex;align-items:center;gap:10px;padding:12px 40px;}

/* HERO */
.entrada-hero{position:relative;min-height:72vh;display:flex;align-items:flex-end;overflow:hidden;background:var(--navy-dark);}
.entrada-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.38;}
.entrada-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,22,38,.97) 0%,rgba(11,22,38,.55) 55%,rgba(11,22,38,.1) 100%);}
.entrada-hero-line{position:absolute;left:3.5%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(184,146,74,.35) 20%,rgba(184,146,74,.35) 80%,transparent);}
.entrada-hero-content{position:relative;z-index:2;padding:68px 5% 64px 5.5%;max-width:820px;}
.entrada-back{display:inline-flex;align-items:center;gap:8px;font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:44px;transition:color .2s;}
.entrada-back:hover{color:var(--gold);}
.entrada-meta-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.entrada-badge{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;background:var(--gold);color:#fff;padding:6px 14px;}
.entrada-badge-cronica{background:var(--navy);}
.entrada-meta-info{display:flex;gap:20px;flex-wrap:wrap;}
.entrada-meta-item{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px;}
.entrada-meta-item i{color:rgba(184,146,74,.6);font-size:.7rem;}
.entrada-titol{font-family:var(--font-serif);font-size:clamp(2.4rem,5.5vw,4.2rem);color:#fff;line-height:1.06;font-weight:700;margin-bottom:14px;}
.entrada-titol em{font-style:italic;color:rgba(212,169,106,.9);}
.entrada-subtitol{font-size:.98rem;color:rgba(255,255,255,.55);font-weight:300;line-height:1.85;max-width:560px;}

/* COS */
.entrada-cos{max-width:900px;margin:0 auto;padding:72px 4%;}
.e-label{font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block;}
.e-title{font-family:var(--font-serif);font-size:1.75rem;color:var(--navy-dark);line-height:1.2;margin-bottom:22px;}
.e-p{font-size:1rem;font-weight:300;color:#444;line-height:1.9;margin-bottom:20px;}
.e-p strong{font-weight:700;color:var(--navy-dark);}
.e-divider{width:48px;height:3px;background:var(--gold);opacity:.35;margin:44px 0;}

/* GRID 2 COL */
.e-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:60px;}
.e-img{position:relative;}
.e-img img{width:100%;height:380px;object-fit:cover;position:relative;z-index:1;}
.e-img::after{content:'';position:absolute;bottom:-14px;right:-14px;width:50%;height:50%;border:2px solid var(--gold);opacity:.2;z-index:0;}

/* FOTO PLENA */
.e-foto{margin:52px 0;position:relative;overflow:hidden;}
.e-foto img{width:100%;height:420px;object-fit:cover;}
.e-foto-peu{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(to top,rgba(11,22,38,.75),transparent);font-size:.7rem;color:rgba(255,255,255,.55);font-style:italic;}
.e-foto-placeholder{width:100%;height:320px;background:var(--cream2);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.e-foto-placeholder i{font-size:2rem;color:var(--border);}
.e-foto-placeholder span{font-size:.65rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--border);}

/* MENÚ */
.e-menu{background:var(--cream2);border:1px solid var(--border);padding:48px;margin:52px 0;}
.e-menu-title{font-family:var(--font-serif);font-size:1.4rem;color:var(--navy-dark);margin-bottom:32px;text-align:center;}
.e-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 48px;}
.e-menu-bloc-title{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.e-menu-bloc-title.mt{margin-top:24px;}
.e-menu-plat{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px;}
.e-menu-plat-ico{font-size:1rem;flex-shrink:0;margin-top:2px;}
.e-menu-plat-nom{font-size:.9rem;font-weight:300;color:var(--navy);line-height:1.5;}
.e-menu-plat-nom strong{font-weight:700;}
.e-menu-vi{grid-column:1/-1;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.e-menu-vi-label{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
.e-menu-vi-text{font-size:.9rem;font-weight:300;color:var(--muted);line-height:1.5;}

/* MOMENTS */
.e-moment{background:#fff;padding:36px;border-left:4px solid var(--gold);margin:28px 0;box-shadow:var(--shadow);}
.e-moment-titol{font-family:var(--font-serif);font-size:1.1rem;font-weight:600;color:var(--navy-dark);margin-bottom:12px;}
.e-moment-text{font-size:.95rem;color:var(--muted);line-height:1.75;}
.e-moment-text strong{color:var(--navy-dark);font-weight:700;}

/* FITXA */
.e-fitxa{background:var(--cream2);border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:0;margin:52px 0;}
.e-fitxa-info{padding:36px 40px;}
.e-fitxa-info h3{font-family:var(--font-serif);font-size:1.15rem;color:var(--navy-dark);margin-bottom:20px;}
.e-fitxa-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.e-fitxa-ico{width:32px;height:32px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.e-fitxa-ico i{color:var(--navy);opacity:.6;font-size:.8rem;}
.e-fitxa-text{font-size:.87rem;color:var(--muted);line-height:1.5;}
.e-fitxa-cta{background:var(--navy-dark);padding:36px 40px;display:flex;flex-direction:column;justify-content:center;text-align:center;}
.e-fitxa-cta p{font-size:.88rem;color:rgba(255,255,255,.55);line-height:1.75;margin-bottom:20px;font-weight:300;}

/* BUTTONS */
.btn-primary{display:inline-block;font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;background:var(--gold);color:#fff;border:2px solid var(--gold);transition:all .25s;}
.btn-primary:hover{background:#9a7a3c;border-color:#9a7a3c;}
.btn-outline{display:inline-block;font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;background:transparent;color:var(--navy);border:2px solid var(--navy);transition:all .25s;}
.btn-outline:hover{background:var(--navy);color:#fff;}

/* RETORN */
.e-nav-retorn{border-top:1px solid var(--border);padding:48px;text-align:center;}

/* FOOTER */
.footer{background:var(--navy);color:rgba(255,255,255,.5);}
.footer-main{max-width:1140px;margin:0 auto;padding:60px 40px 48px;display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:40px;}
.footer-brand img{height:40px;margin-bottom:16px;filter:brightness(0) invert(1);opacity:.8;}
.footer-brand p{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);line-height:1.7;margin-bottom:18px;}
.footer-social{display:flex;gap:14px;}
.footer-social a{color:rgba(255,255,255,.35);transition:color .2s;}
.footer-social a:hover{color:var(--gold);}
.footer-col h4{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.footer-col ul{display:flex;flex-direction:column;gap:9px;}
.footer-col a{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-col p{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);margin-bottom:5px;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.07);max-width:1140px;margin:0 auto;padding:18px 40px;}
.footer-bottom p{font-size:.62rem;letter-spacing:.05em;color:rgba(255,255,255,.2);}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-menu{display:none;}
  .hamburger{display:flex;}
  .nav-inner{padding:0 20px;}
  .entrada-hero-content{padding:68px 5% 48px;}
  .entrada-cos{padding:48px 5%;}
  .e-grid-2{grid-template-columns:1fr;gap:36px;}
  .e-menu{padding:32px 20px;}
  .e-menu-grid{grid-template-columns:1fr;gap:0;}
  .e-foto img{height:240px;}
  .e-fitxa{grid-template-columns:1fr;}
  .footer-main{grid-template-columns:1fr;gap:28px;padding-top:40px;}
  .e-nav-retorn{padding:32px 20px;}
}
</style>
</head>

  footer_privacitat: {es:'Política de Privacidad', ca:'Política de Privacitat'},
  footer_contacte:   {es:'Contacto', ca:'Contacte'},
  footer_copy:       {es:'© 2026 Gourmets de Tarragona · Asociación Gastronómica · Todos los derechos reservados', ca:'© 2026 Gourmets de Tarragona · Associació Gastronòmica · Tots els drets reservats'},
  btn_retorn:        {es:'← Volver al inicio', ca:"← Tornar a l'inici"},
};

let currentLang = localStorage.getItem('lang') || 'es';

function applyLang() {
  document.getElementById('html-root').lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (T[k] && T[k][currentLang] !== undefined) el.innerHTML = T[k][currentLang];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  applyLang();
  document.getElementById('mobileMenu').classList.remove('open');
}

document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('mobileMenu').classList.toggle('open');
});
document.querySelectorAll('.mobile-item a').forEach(a => {
  a.addEventListener('click', () => document.getElementById('mobileMenu').classList.remove('open'));
});

applyLang();
</script>
</body>
