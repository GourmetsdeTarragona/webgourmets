var t = {

    footer_desc:'Asociación gastronómica sin ánimo de lucro.',footer_nav:'Navegación',footer_legal:'Legal',footer_contacte:'Contacto',footer_avis:'Aviso Legal',footer_privacitat:'Política de Privacidad',footer_copy:'© 2026 Gourmets de Tarragona · Todos los derechos reservados',

    goleta_badge:'Crónica · 9 Abril 2026',
    goleta_subtitol:'Una noche junto a José Vilaseca Rius. Cuarenta años de coherencia, producto impecable y servicio clásico. La constatación de que no siempre es necesario cambiar lo que funciona.',
    goleta_l1:'La visita',goleta_t1:'Cuarenta años sin decepcionar',
    goleta_p1:'La Platja dels Capellans de Salou ha sido testigo de cuarenta años de historia gastronómica. Desde 1986, La Goleta ha permanecido en el mismo lugar, con la misma filosofía y el mismo respeto por el producto del mar. No son grandes alardes, ni técnicas raras, ni deconstrucciones. Es simplemente producto impecable, ejecución técnica reconocible y la convicción de que si algo funciona, no es necesario cambiarlo.',
    goleta_p2:'La noche del 9 de abril llegamos treinta y seis comensales. Entre nosotros, una presencia singular: José Vilaseca Rius, cofundador de los Casacas Rojas de Barcelona, una institución gastronómica que a su manera ha marcado generaciones. Vilaseca no solo comió con nosotros. Vilaseca nos enseñó, nos hizo reír y, al final, todos fuimos un poco Casaca Roja.',
    goleta_p3:'La sala es conocida por la mayoría de nosotros. Poco ha cambiado. Ni siquiera es un defecto. Es una afirmación. Elegante, acogedora, clásica — todo lo que los restaurantes modernistas abandonan, La Goleta lo resuelve con sobriedad.',
    goleta_sala_label:'El espacio',goleta_sala_title:'Elegancia clásica, sin modernismos',
    goleta_sala_p1:'La mayoría de los comensales conocía ya el espacio. Las vistas sobre la playa, los detalles de madera, la iluminación cálida. Todo permanece. Y todo funciona.',
    goleta_sala_p2:'Ignacio Ureña, maître y sumiller durante años, ahora dirige el proyecto. Su presencia fue la de un maestro de ceremonia: explicaciones de los platos, contexto del vino, atención a cada detalle. Continuidad con visión.',
    goleta_anecdota_titulo:'🎯 La anécdota que Ignacio nos contó',
    goleta_anecdota_texto:'Durante la charla de Vilaseca, Ignacio recordó una historia real sobre Emilio Vicente, el fundador: durante años, nunca mostró la carta a los clientes. Simplemente vendía los platos, sin necesidad de que vieran escrito qué comían. Después de cuarenta años, finalmente comenzaron a ver las cartas. Es una anécdota perfecta que resume la filosofía del lugar: la confianza en quien cocina, no en la descripción impresa. Era Ignacio quien contaba esto, desde la experiencia de haber trabajado junto a Vicente durante años.',
    goleta_comida_label:'El recorrido',goleta_comida_title:'Producto mandando, técnica sirviendo',
    goleta_comida_p1:'La propuesta gastronómica de La Goleta se articula alrededor de una verdad simple: el producto es el protagonista. Peix i marisco de calidad máxima, superfresco, tratado con cuidado. No hay florituras. No hay técnicas raras. Lo que hay es respeto por la materia prima y la capacidad de dejarla hablar.',
    goleta_comida_p2:'El comentario más extendido entre los comensales fue directo: "Si esto es así y funciona, ¿por qué cambiarlo?" Cuarenta años de calidad alta, de cuidado máximo, de ejecución limpia. Ese es el argumento que La Goleta defiende. Y es sólido.',

    goleta_menu_rapes:'Degustación de rapes',goleta_menu_p7:'Rape con salsa de puerros y azafrán',goleta_menu_p8:'Tempura de rape con crema de roquefort ← El momento',

function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[lang] && t[lang][key]) { el.textContent = t[lang][key]; }

  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
}
