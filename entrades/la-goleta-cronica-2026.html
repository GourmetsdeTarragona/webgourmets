<html lang="es" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Goleta · Crònica · Gourmets de Tarragona</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ── VARIABLES (inline, equiv. variables.css) ── */
:root{
  --navy:#1c2e3e;
  --navy-dark:#0e1e2c;
  --gold:#b8924a;
  --gold-light:#d4a96a;
  --cream:#f5f0e8;
  --cream2:#ede7da;
  --white:#fff;
  --muted:#6b6b6b;
  --border:#e0d8cc;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-ui:'Lato',system-ui,sans-serif;
  --shadow:0 4px 24px rgba(28,46,62,.10);
  --radius:0px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-ui);color:var(--navy);background:var(--cream);line-height:1.6;overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ── NAV (equiv. nav.css) ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;transition:background .3s,box-shadow .3s;}
#nav.solid{background:rgba(245,240,232,.97);backdrop-filter:blur(12px);box-shadow:0 1px 20px rgba(28,46,62,.10);}
.nav-inner{max-width:1160px;margin:0 auto;padding:0 40px;height:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo img{height:42px;width:auto;display:block;}
.nav-logo-name{font-family:var(--font-serif);font-size:1rem;font-weight:600;color:var(--navy);line-height:1.2;}
.nav-menu{display:flex;gap:4px;align-items:center;}
.nav-item{position:relative;}
.nav-item>a,.nav-item>span{
  display:block;padding:8px 14px;
  font-family:var(--font-ui);font-size:.68rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  cursor:pointer;transition:color .2s;white-space:nowrap;
}
.nav-item>a:hover,.nav-item>span:hover,.nav-item:hover>span{color:var(--navy);}
.dropdown{
  display:none;position:absolute;top:100%;left:0;
  background:var(--cream);border:1px solid var(--border);
  min-width:200px;box-shadow:0 8px 24px rgba(28,46,62,.12);z-index:100;
}
.nav-item:hover .dropdown{display:block;}
.dropdown a{
  display:block;padding:10px 18px;
  font-family:var(--font-ui);font-size:.7rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);transition:background .15s,color .15s;
}
.dropdown a:last-child{border-bottom:none;}
.dropdown a:hover{background:var(--cream2);color:var(--navy);}
.nav-right{display:flex;align-items:center;gap:10px;}
.lang-btn{background:none;border:none;cursor:pointer;font-family:var(--font-ui);font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);padding:4px 2px;transition:color .2s;}
.lang-btn.active{color:var(--navy);}
.lang-btn:hover{color:var(--navy);}
.lang-sep{color:var(--border);font-size:.8rem;}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--navy);transition:.3s;}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:var(--cream);z-index:199;padding:16px 0 24px;box-shadow:0 8px 24px rgba(28,46,62,.12);}
.mobile-menu.open{display:block;}
.mobile-item a{display:block;padding:11px 40px;font-family:var(--font-ui);font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.mobile-item a:hover{color:var(--navy);}
.mobile-lang{display:flex;align-items:center;gap:10px;padding:12px 40px;}

/* ── BUTTONS (equiv. seccions.css) ── */
.btn-primary{display:inline-block;font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:13px 28px;background:var(--gold);color:#fff;border:2px solid var(--gold);transition:all .25s;}
.btn-primary:hover{background:#9a7a3c;border-color:#9a7a3c;}
.btn-outline{display:inline-block;font-family:var(--font-ui);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:13px 28px;background:transparent;color:var(--navy);border:2px solid var(--navy);transition:all .25s;}
.btn-outline:hover{background:var(--navy);color:#fff;}

/* FOOTER */
.footer{background:var(--navy);color:rgba(255,255,255,.5);}
.footer-main{max-width:1160px;margin:0 auto;padding:60px 40px 48px;display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:40px;}
.footer-brand img{height:40px;margin-bottom:16px;filter:brightness(0) invert(1);opacity:.8;}
.footer-brand p{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);line-height:1.7;margin-bottom:18px;}
.footer-social{display:flex;gap:14px;}
.footer-social a{color:rgba(255,255,255,.35);transition:color .2s;}
.footer-social a:hover{color:var(--gold);}
.footer-col h4{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.footer-col ul{display:flex;flex-direction:column;gap:9px;}
.footer-col a{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);transition:color .2s;}
.footer-col a:hover{color:#fff;}
.footer-col p{font-size:.85rem;font-weight:300;color:rgba(255,255,255,.4);margin-bottom:5px;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.07);max-width:1160px;margin:0 auto;padding:18px 40px;}
.footer-bottom p{font-size:.62rem;letter-spacing:.05em;color:rgba(255,255,255,.2);}

/* ── HERO ── */
.entrada-hero{position:relative;min-height:75vh;display:flex;align-items:flex-end;overflow:hidden;background:#0b1626;}
.entrada-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.38;}
.entrada-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,22,38,.97) 0%,rgba(11,22,38,.55) 55%,rgba(11,22,38,.1) 100%);}
.entrada-hero-line{position:absolute;left:3.5%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(184,146,74,.35) 20%,rgba(184,146,74,.35) 80%,transparent);}
.entrada-hero-content{position:relative;z-index:2;padding:0 5% 64px 5.5%;max-width:800px;}
.entrada-back{display:inline-flex;align-items:center;gap:8px;font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:44px;transition:color .2s;}
.entrada-back:hover{color:var(--gold);}
.entrada-meta-top{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.entrada-badge{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;background:var(--gold);color:#fff;padding:6px 14px;}
.entrada-meta-info{display:flex;gap:20px;flex-wrap:wrap;}
.entrada-meta-item{font-size:.65rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px;}
.entrada-meta-item i{color:rgba(184,146,74,.6);font-size:.7rem;}
.entrada-titol{font-family:var(--font-serif);font-size:clamp(2.4rem,5.5vw,4.2rem);color:#fff;line-height:1.06;font-weight:700;margin-bottom:14px;}
.entrada-titol em{font-style:italic;color:rgba(212,169,106,.9);}
.entrada-subtitol{font-size:.98rem;color:rgba(255,255,255,.55);font-weight:300;line-height:1.85;max-width:540px;}

/* ── COS ── */
.entrada-cos{max-width:900px;margin:0 auto;padding:72px 4%;}
.e-label{font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block;}
.e-title{font-family:var(--font-serif);font-size:1.75rem;color:var(--navy-dark);line-height:1.2;margin-bottom:22px;}
.e-p{font-size:1rem;font-weight:300;color:#444;line-height:1.9;margin-bottom:20px;}
.e-p strong{font-weight:700;color:var(--navy-dark);}
.e-divider{width:48px;height:3px;background:var(--gold);opacity:.35;margin-bottom:24px;}
.e-sep{text-align:center;margin:52px 0;color:var(--gold);font-size:1rem;letter-spacing:10px;opacity:.35;}

/* ACTE HEADER */
.e-acte{border-left:4px solid var(--navy);padding-left:22px;margin-bottom:8px;}
.e-acte .e-label{margin-bottom:4px;}
.e-acte .e-title{margin-bottom:0;}

/* GRID 2 COL */
.e-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:52px;}
.e-img{position:relative;}
.e-img img{width:100%;height:420px;object-fit:cover;position:relative;z-index:1;}
.e-img::after{content:'';position:absolute;bottom:-14px;right:-14px;width:50%;height:50%;border:2px solid var(--gold);opacity:.2;z-index:0;}

/* GRILLES FOTOS */
.e-fotos-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:32px 0;}
.e-fotos-3 img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.e-fotos-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:32px 0;}
.e-fotos-2 img{width:100%;height:280px;object-fit:cover;}

/* FOTO GRAN */
.e-foto-gran{margin:48px 0;position:relative;height:440px;overflow:hidden;}
.e-foto-gran img{width:100%;height:100%;object-fit:cover;}
.e-foto-gran-peu{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(to top,rgba(11,22,38,.8),transparent);font-size:.7rem;color:rgba(255,255,255,.6);font-style:italic;}

/* MARIDATGE */
.e-maridatge{background:var(--cream);border:1px solid var(--border);padding:14px 20px;margin:20px 0;display:flex;align-items:center;gap:14px;}
.e-maridatge i{color:var(--gold);font-size:.9rem;flex-shrink:0;}
.e-maridatge-text{font-size:.85rem;color:var(--muted);line-height:1.5;}
.e-maridatge-text strong{color:var(--navy-dark);font-weight:700;}

/* BLOC VINS */
.e-vins{background:var(--navy-dark);padding:48px;margin:52px 0;}
.e-vins-title{font-family:var(--font-serif);font-size:1.6rem;color:#fff;margin-bottom:10px;}
.e-vins-desc{font-size:.9rem;color:rgba(255,255,255,.55);font-weight:300;line-height:1.8;margin-bottom:28px;}
.e-vins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.e-vi{background:rgba(255,255,255,.06);padding:16px;border-left:3px solid rgba(184,146,74,.4);}
.e-vi-acte{font-size:.6rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(184,146,74,.65);margin-bottom:6px;}
.e-vi-nom{font-size:.88rem;color:#fff;line-height:1.45;}
.e-vi-do{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:3px;}
.e-vins-nota{font-size:.82rem;color:rgba(255,255,255,.35);font-style:italic;margin-top:20px;}

/* SALA GRID */
.e-sala-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;margin:52px 0;}

/* FOTO GRUP */
.e-grup{margin:52px 0;}
.e-grup img{width:100%;height:440px;object-fit:cover;object-position:center 30%;}
.e-grup-peu{text-align:center;font-size:.85rem;color:var(--muted);margin-top:12px;font-style:italic;}

/* FITXA 3-COL */
.e-fitxa{background:var(--cream);border:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:52px 0;text-align:center;}
.e-fitxa-item{padding:32px 24px;border-right:1px solid var(--border);}
.e-fitxa-item:last-child{border-right:none;}
.e-fitxa-label{font-size:.62rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
.e-fitxa-valor{font-family:var(--font-serif);font-size:1.05rem;color:var(--navy-dark);}

/* NOTA FINAL */
.e-nota-final{font-size:.85rem;color:var(--muted);text-align:center;font-style:italic;margin-top:24px;}

/* NAV RETORN */
.e-nav-retorn{border-top:1px solid var(--border);padding:40px;text-align:center;}
.e-nav-retorn-links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-menu{display:none;}
  .hamburger{display:flex;}
  .nav-inner{padding:0 20px;}
  .entrada-hero-content{padding:0 5% 52px;}
  .e-grid-2,.e-sala-grid{grid-template-columns:1fr;gap:32px;}
  .e-img::after{display:none;}
  .e-fotos-3{grid-template-columns:1fr 1fr;}
  .e-foto-gran,.e-grup img{height:260px;}
  .e-vins{padding:32px 20px;}
  .e-vins-grid{grid-template-columns:1fr 1fr;}
  .e-fitxa{grid-template-columns:1fr;}
  .e-fitxa-item{border-right:none;border-bottom:1px solid var(--border);}
  .e-fitxa-item:last-child{border-bottom:none;}
  .entrada-cos{padding:52px 5%;}
  .footer-main{grid-template-columns:1fr;gap:28px;padding-top:40px;}
  .e-nav-retorn{padding:32px 20px;}
}
</style>
</head>

function applyTranslations(lang){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');
    if(T[k]&&T[k][lang]!==undefined) el.innerHTML=T[k][lang];
  });
  var r=document.getElementById('html-root');
  if(r) r.setAttribute('lang',lang);
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-lang')===lang);
  });
}

function setLang(lang){
  currentLang=lang;
  localStorage.setItem('gdt-lang',lang);
  applyTranslations(lang);
  document.getElementById('mobileMenu').classList.remove('open');
}
