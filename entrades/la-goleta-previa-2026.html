<style>
/* ── HERO ── */
.entrada-hero{position:relative;min-height:70vh;display:flex;align-items:flex-end;overflow:hidden;background:#0b1626;}
.entrada-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.4;}
.entrada-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,22,38,.97) 0%,rgba(11,22,38,.55) 55%,rgba(11,22,38,.1) 100%);}
.entrada-hero-line{position:absolute;left:3.5%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(184,146,74,.35) 20%,rgba(184,146,74,.35) 80%,transparent);}
.entrada-hero-content{position:relative;z-index:2;padding:0 5% 64px 5.5%;max-width:800px;}
.entrada-back{display:inline-flex;align-items:center;gap:8px;font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:44px;transition:color .2s;}
.entrada-back:hover{color:var(--gold);}
.entrada-meta-top{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.entrada-badge{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;background:var(--gold);color:#fff;padding:6px 14px;}
.entrada-badge-previa{background:var(--navy);}
.entrada-meta-info{display:flex;gap:20px;flex-wrap:wrap;}
.entrada-meta-item{font-size:.65rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:6px;}
.entrada-meta-item i{color:rgba(184,146,74,.6);font-size:.7rem;}
.entrada-titol{font-family:var(--font-serif);font-size:clamp(2.4rem,5.5vw,4.2rem);color:#fff;line-height:1.06;font-weight:700;margin-bottom:14px;}
.entrada-titol em{font-style:italic;color:rgba(212,169,106,.9);}
.entrada-subtitol{font-size:.98rem;color:rgba(255,255,255,.55);font-weight:300;line-height:1.85;max-width:540px;}

/* ── COS ── */
.entrada-cos{max-width:900px;margin:0 auto;padding:72px 4%;}
.e-label{font-size:.65rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:block;}
.e-title{font-family:var(--font-serif);font-size:1.75rem;color:var(--navy-dark);line-height:1.2;margin-bottom:22px;}
.e-p{font-size:1rem;font-weight:300;color:#444;line-height:1.9;margin-bottom:20px;}
.e-p strong{font-weight:700;color:var(--navy-dark);}
.e-divider{width:48px;height:3px;background:var(--gold);opacity:.35;margin:48px 0;}

/* ── GRID INTRO ── */
.e-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:60px;}
.e-img{position:relative;}
.e-img img{width:100%;height:420px;object-fit:cover;position:relative;z-index:1;}
.e-img::after{content:'';position:absolute;bottom:-14px;right:-14px;width:50%;height:50%;border:2px solid var(--gold);opacity:.2;z-index:0;}

/* ── ANIVERSARI BADGE ── */
.e-aniv{display:inline-flex;align-items:center;gap:14px;background:var(--navy-dark);padding:14px 24px;margin-bottom:28px;}
.e-aniv-num{font-family:var(--font-serif);font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1;}
.e-aniv-text{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6);line-height:1.4;}

/* ── PROGRAMA ── */
.e-programa{background:var(--cream);border:1px solid var(--border);padding:36px;margin:32px 0;}
.e-programa-title{font-family:var(--font-serif);font-size:1.1rem;color:var(--navy-dark);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.e-programa-title i{color:var(--gold);font-size:.9rem;}
.e-programa-item{display:flex;gap:16px;align-items:flex-start;margin-bottom:12px;}
.e-programa-hora{font-size:.75rem;font-weight:700;color:var(--gold);letter-spacing:1px;white-space:nowrap;padding-top:2px;min-width:52px;}
.e-programa-desc{font-size:.88rem;color:var(--muted);line-height:1.5;}

/* ── MENÚ ── */
.e-menu{background:var(--cream);border:1px solid var(--border);padding:48px;margin:52px 0;}
.e-menu-title{font-family:var(--font-serif);font-size:1.4rem;color:var(--navy-dark);margin-bottom:8px;text-align:center;}
.e-menu-sub{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:32px;}
.e-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 48px;}
.e-menu-bloc-title{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.e-menu-plat{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.e-menu-plat-ico{font-size:1rem;flex-shrink:0;margin-top:1px;}
.e-menu-plat-nom{font-size:.9rem;font-weight:300;color:var(--navy);line-height:1.5;}
.e-menu-vi{grid-column:1/-1;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.e-menu-vi-label{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
.e-menu-vi-text{font-size:.9rem;font-weight:300;color:var(--muted);line-height:1.5;}

/* ── VALS RÀPIDS ── */
.e-vals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
.e-val{display:flex;gap:10px;padding:12px 14px;background:#fff;border-left:3px solid var(--navy);align-items:center;}
.e-val i{color:var(--navy);opacity:.6;font-size:.9rem;width:16px;text-align:center;}
.e-val span{font-size:.87rem;line-height:1.4;}

/* ── CONVIDAT ── */
.e-convidat{background:var(--navy-dark);padding:36px;margin:52px 0;display:flex;gap:28px;align-items:flex-start;}
.e-convidat-avatar{width:56px;height:56px;border-radius:50%;background:rgba(184,146,74,.2);border:1px solid rgba(184,146,74,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:1.3rem;color:var(--gold);}
.e-convidat-label{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(184,146,74,.7);margin-bottom:6px;}
.e-convidat-nom{font-family:var(--font-serif);font-size:1.1rem;color:#fff;margin-bottom:4px;}
.e-convidat-desc{font-size:.85rem;color:rgba(255,255,255,.5);font-weight:300;line-height:1.6;}

/* ── FOTO GRAN ── */
.e-foto-gran{margin:52px 0;position:relative;height:420px;overflow:hidden;}
.e-foto-gran img{width:100%;height:100%;object-fit:cover;}
.e-foto-gran-peu{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(to top,rgba(11,22,38,.75),transparent);font-size:.7rem;color:rgba(255,255,255,.55);font-style:italic;}

/* ── FITXA ── */
.e-fitxa{background:var(--cream);border:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:0;margin:52px 0;}
.e-fitxa-info{padding:36px 40px;}
.e-fitxa-info h3{font-family:var(--font-serif);font-size:1.15rem;color:var(--navy-dark);margin-bottom:20px;}
.e-fitxa-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.e-fitxa-ico{width:32px;height:32px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.e-fitxa-ico i{color:var(--navy);opacity:.6;font-size:.8rem;}
.e-fitxa-text{font-size:.87rem;color:var(--muted);line-height:1.5;}
.e-fitxa-cta{background:var(--navy-dark);padding:36px 40px;display:flex;flex-direction:column;justify-content:center;text-align:center;}
.e-fitxa-cta p{font-size:.88rem;color:rgba(255,255,255,.55);line-height:1.75;margin-bottom:20px;font-weight:300;}

/* ── NAV RETORN ── */
.e-nav-retorn{border-top:1px solid var(--border);padding:40px;text-align:center;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .entrada-hero-content{padding:0 5% 52px;}
  .e-grid-2{grid-template-columns:1fr;gap:36px;}
  .e-menu{padding:32px 20px;}
  .e-menu-grid{grid-template-columns:1fr;}
  .e-vals{grid-template-columns:1fr;}
  .e-fitxa{grid-template-columns:1fr;}
  .e-foto-gran{height:260px;}
  .entrada-cos{padding:52px 5%;}
  .e-convidat{flex-direction:column;gap:16px;}
}
</style>
