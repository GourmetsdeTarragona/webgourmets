<head>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/variables.css">

<style>
.page-hero{background:var(--navy-dark);padding:140px 4% 72px;text-align:center;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background-image:url('../assets/img/hero.jpg');background-size:cover;background-position:center;opacity:.08;}
.page-hero-inner{position:relative;z-index:1;max-width:600px;margin:0 auto;}
.page-hero .slabel{color:rgba(255,255,255,.4);justify-content:center;display:flex;}
.page-hero .stitle{color:#fff;font-size:clamp(2rem,4vw,3rem);margin-top:10px;}
.page-hero-desc{font-size:.95rem;color:rgba(255,255,255,.5);font-weight:300;line-height:1.8;margin-top:10px;}

.contacte-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}
.contacte-info-item{display:flex;gap:18px;align-items:flex-start;margin-bottom:28px;}
.contacte-info-ico{width:44px;height:44px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.contacte-info-ico i{color:#fff;font-size:.9rem;}
.contacte-info-label{font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.contacte-info-val{font-size:.95rem;color:var(--navy-dark);font-weight:300;line-height:1.6;}
.contacte-info-val a{color:var(--navy-dark);transition:color .2s;}
.contacte-info-val a:hover{color:var(--gold);}
.contacte-social{display:flex;gap:12px;margin-top:32px;}
.contacte-social a{width:44px;height:44px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;transition:.2s;}
.contacte-social a:hover{background:var(--gold);}

.contacte-form-wrap{background:var(--cream);border:1px solid var(--border);padding:44px;}
.form-group{margin-bottom:20px;}
.form-label{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy-dark);display:block;margin-bottom:8px;}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);background:#fff;font-family:var(--font-body);font-size:.9rem;color:var(--navy-dark);transition:border-color .2s;outline:none;}
.form-input:focus{border-color:var(--navy);}
.form-textarea{resize:vertical;min-height:130px;}
.form-submit{width:100%;background:var(--navy);color:#fff;border:none;padding:14px;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;font-family:var(--font-body);}
.form-submit:hover{background:var(--navy-dark);}
.form-note{font-size:.78rem;color:var(--muted);margin-top:10px;text-align:center;line-height:1.6;}

@media(max-width:768px){
  .contacte-grid{grid-template-columns:1fr;gap:40px;}
  .page-hero{padding:120px 5% 52px;}
  .contacte-form-wrap{padding:28px 20px;}
}
</style>

<script>
const t = {

    c_label:'Contacto',

    nav_visites:'Visites 2025–26',nav_gastronia:'Trofeu Gastronía',

    c_note:"Responem en un termini de 48 hores. La teva informació no serà compartida amb tercers.",
  }
};
let currentLang = localStorage.getItem('gdt-lang') || 'es';
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[lang] && t[lang][key] !== undefined) el.innerHTML = t[lang][key];
  });
  // Placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (t[lang] && t[lang][key] !== undefined) el.placeholder = t[lang][key];
  });
  document.getElementById('html-root')?.setAttribute('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
}
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('gdt-lang', lang);
  applyTranslations(lang);
}
</script>
