<script>
const t = {
  es:{
    nav_inicio:'Inicio',nav_asoc:'La Asociación',nav_rest:'Restaurantes',
    nav_premios:'Premios',nav_blog:'Blog Gourmet',nav_contacto:'Contacto',
    nav_quienes:'Quiénes somos',nav_como:'Cómo funcionamos',
    nav_visites:'Visitas 2025-26',nav_gastronia:'Trofeo Gastronía',
    nav_bacus:'Premio Baccus',nav_rest_short:'Restaurantes',nav_premios_short:'Premios',
    footer_desc:'Asociación gastronómica sin ánimo de lucro.<br>Camp de Tarragona.',
    footer_nav:'Navegación',footer_legal:'Legal',footer_contacte:'Contacto',
    footer_avis:'Aviso Legal',footer_privacitat:'Política de Privacidad',
    footer_copy:'© 2026 Gourmets de Tarragona · Todos los derechos reservados',
    legal_label:'Privacidad',legal_title:'Política de Privacidad',
    legal_contingut:`<h2>1. Responsable del tratamiento</h2>
<p>La Asociación Gourmets de Tarragona es la responsable del tratamiento de los datos personales facilitados a través de este sitio web. Contacto: <a href="mailto:gourmetsdetarragona@gourmetsdetarragona.com">gourmetsdetarragona@gourmetsdetarragona.com</a></p>
<h2>2. Datos que recogemos</h2>
<p>Únicamente recogemos los datos que nos facilitas voluntariamente a través del formulario de contacto: nombre, correo electrónico y el contenido de tu mensaje.</p>
<h2>3. Finalidad</h2>
<p>Los datos se utilizan exclusivamente para responder a tu consulta o solicitud. No utilizamos los datos para ninguna finalidad comercial ni los cedemos a terceros.</p>
<h2>4. Base legal</h2>
<p>El tratamiento se basa en tu consentimiento explícito al enviar el formulario de contacto.</p>
<h2>5. Conservación</h2>
<p>Los datos se conservan durante el tiempo necesario para atender tu consulta y, posteriormente, durante el plazo legalmente exigible.</p>
<h2>6. Tus derechos</h2>
<p>Puedes ejercer tus derechos de acceso, rectificación, supresión, oposición y portabilidad escribiéndonos a <a href="mailto:gourmetsdetarragona@gourmetsdetarragona.com">gourmetsdetarragona@gourmetsdetarragona.com</a>. También puedes presentar una reclamación ante la Agencia Española de Protección de Datos (aepd.es).</p>`,
  },
  ca:{
    nav_inicio:'Inici',nav_asoc:"L'Associació",nav_rest:'Restaurants',
    nav_premios:'Premis',nav_blog:'Blog Gourmet',nav_contacto:'Contacte',
    nav_quienes:'Qui som',nav_como:'Com funcionem',
    nav_visites:'Visites 2025-26',nav_gastronia:'Trofeu Gastronía',
    nav_bacus:'Premi Bacus',nav_rest_short:'Restaurants',nav_premios_short:'Premis',
    footer_desc:"Associació gastronòmica sense ànim de lucre.<br>Camp de Tarragona.",
    footer_nav:'Navegació',footer_legal:'Legal',footer_contacte:'Contacte',
    footer_avis:'Avís Legal',footer_privacitat:'Política de Privacitat',
    footer_copy:'© 2026 Gourmets de Tarragona · Tots els drets reservats',
    legal_label:'Privacitat',legal_title:'Política de Privacitat',
    legal_contingut:`<h2>1. Responsable del tractament</h2>
<p>L'Associació Gourmets de Tarragona és la responsable del tractament de les dades personals facilitades a través d'aquest lloc web. Contacte: <a href="mailto:gourmetsdetarragona@gourmetsdetarragona.com">gourmetsdetarragona@gourmetsdetarragona.com</a></p>
<h2>2. Dades que recollim</h2>
<p>Únicament recollim les dades que ens facilites voluntàriament a través del formulari de contacte: nom, correu electrònic i el contingut del teu missatge.</p>
<h2>3. Finalitat</h2>
<p>Les dades s'utilitzen exclusivament per respondre a la teva consulta o sol·licitud. No les utilitzem per a cap finalitat comercial ni les cedim a tercers.</p>
<h2>4. Base legal</h2>
<p>El tractament es basa en el teu consentiment explícit en enviar el formulari de contacte.</p>
<h2>5. Conservació</h2>
<p>Les dades es conserven durant el temps necessari per atendre la teva consulta i, posteriorment, durant el termini legalment exigible.</p>
<h2>6. Els teus drets</h2>
<p>Pots exercir els teus drets d'accés, rectificació, supressió, oposició i portabilitat escrivint-nos a <a href="mailto:gourmetsdetarragona@gourmetsdetarragona.com">gourmetsdetarragona@gourmetsdetarragona.com</a>. També pots presentar una reclamació davant l'Agència Espanyola de Protecció de Dades (aepd.es).</p>`,
  }
};
let currentLang = localStorage.getItem('gdt-lang') || 'es';
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[lang] && t[lang][key] !== undefined) el.innerHTML = t[lang][key];
  });
  document.getElementById('html-root')?.setAttribute('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
}
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('gdt-lang', lang);
  applyTranslations(lang);
}
</script>
</head>
<body>
<nav id="nav" class="solid">

    </div>

      <span class="lang-sep">|</span>
      <button class="lang-btn" data-lang="ca" onclick="setLang('ca')">CA</button>

    </div>
  </div>

    <div class="footer-col"><h4 data-i18n="footer_legal"></h4><ul><li><a href="avis-legal.html" data-i18n="footer_avis"></a></li><li><a href="privacitat.html" data-i18n="footer_privacitat"></a></li><li><a href="cookies.html">Cookies</a></li></ul></div>
    <div class="footer-col"><h4 data-i18n="footer_contacte"></h4><p>gourmetsdetarragona@gourmetsdetarragona.com</p></div>
  </div>
  <div class="footer-bottom"><p data-i18n="footer_copy"></p></div>
</footer>
<script src="../assets/js/main.js"></script>
<script>applyTranslations(currentLang);</script>
