<style>
.page-hero{background:var(--navy-dark);padding:140px 4% 80px;text-align:center;position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background-image:url('../assets/img/gala2025/sala-gala.jpg');background-size:cover;background-position:center;opacity:.12;}
.page-hero-inner{position:relative;z-index:1;max-width:640px;margin:0 auto;}
.page-hero .slabel{color:rgba(255,255,255,.4);justify-content:center;display:flex;}
.page-hero .stitle{color:#fff;font-size:clamp(2rem,4vw,3rem);margin-top:10px;}
.page-hero-desc{font-size:.95rem;color:rgba(255,255,255,.5);font-weight:300;line-height:1.8;margin-top:10px;}

.ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;}
.ev-card{background:#fff;border:1px solid var(--border);overflow:hidden;transition:transform .3s,box-shadow .3s;}
.ev-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
.ev-card-img{height:220px;overflow:hidden;position:relative;background:var(--cream);}
.ev-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.ev-card:hover .ev-card-img img{transform:scale(1.05);}
.ev-badge{position:absolute;top:14px;left:14px;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--navy);color:#fff;padding:5px 12px;}
.ev-body{padding:28px 24px;}
.ev-date{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.ev-title{font-family:var(--font-serif);font-size:1.25rem;color:var(--navy-dark);margin-bottom:10px;line-height:1.3;}
.ev-desc{font-size:.88rem;color:var(--muted);line-height:1.75;font-weight:300;margin-bottom:16px;}
.ev-foot{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);padding-top:16px;border-top:1px solid var(--border);}
.ev-foot i{color:var(--gold);font-size:.8rem;}
.ev-nota{text-align:center;margin-top:48px;font-size:.88rem;color:var(--muted);font-style:italic;line-height:1.8;}

@media(max-width:1024px){.ev-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:640px){.ev-grid{grid-template-columns:1fr;}.page-hero{padding:120px 5% 52px;}}
</style>

  }

let currentLang = localStorage.getItem('gdt-lang') || 'es';
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[lang] && t[lang][key] !== undefined) el.innerHTML = t[lang][key];
  });
  document.getElementById('html-root')?.setAttribute('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
}
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('gdt-lang', lang);
  applyTranslations(lang);
}
